<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#b7c8e1",
              "on-tertiary": "#ffffff",
              "surface-tint": "#565e74",
              "secondary-fixed": "#d3e4fe",
              "tertiary-fixed": "#89f5e7",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "surface-container-high": "#e6e8ea",
              "on-primary-fixed": "#131b2e",
              "surface-dim": "#d8dadc",
              "on-error": "#ffffff",
              "inverse-on-surface": "#eff1f3",
              "on-secondary-fixed": "#0b1c30",
              "outline-variant": "#c6c6cd",
              "surface-variant": "#e0e3e5",
              "outline": "#76777d",
              "primary-fixed-dim": "#bec6e0",
              "inverse-surface": "#2d3133",
              "secondary": "#505f76",
              "tertiary-container": "#00201d",
              "on-tertiary-fixed-variant": "#005049",
              "primary-fixed": "#dae2fd",
              "surface-container-low": "#f2f4f6",
              "primary": "#000000",
              "on-secondary-container": "#54647a",
              "on-secondary-fixed-variant": "#38485d",
              "background": "#f7f9fb",
              "surface-container": "#eceef0",
              "on-surface-variant": "#45464d",
              "error-container": "#ffdad6",
              "on-surface": "#191c1e",
              "on-secondary": "#ffffff",
              "tertiary": "#000000",
              "surface-bright": "#f7f9fb",
              "on-tertiary-fixed": "#00201d",
              "error": "#ba1a1a",
              "on-background": "#191c1e",
              "on-primary-container": "#7c839b",
              "primary-container": "#131b2e",
              "surface": "#f7f9fb",
              "on-primary-fixed-variant": "#3f465c",
              "tertiary-fixed-dim": "#6bd8cb",
              "on-tertiary-container": "#0c9488",
              "inverse-primary": "#bec6e0",
              "surface-container-highest": "#e0e3e5",
              "secondary-container": "#d0e1fb",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .focus-bar-input:focus-within {
            background-color: #ffffff;
            border-left: 2px solid #0c9488;
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen pb-32">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-slate-50 dark:bg-slate-950">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="architecture">architecture</span>
<h1 class="font-manrope font-extrabold text-xl tracking-tighter text-slate-900 dark:text-slate-50">Vercel Dashboard</h1>
</div>
</div>
</header>
<main class="px-6 max-w-2xl mx-auto pt-6">
<header class="mb-6">
<h2 class="font-headline font-bold text-3xl tracking-tight text-on-surface">Add New Project</h2>
<p class="text-on-surface-variant mt-2 font-body text-sm">Deploy a fresh architectural vision to the cloud.</p>
</header>
<form class="space-y-8">
<!-- Project Name -->
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Project Name</label>
<div class="focus-bar-input bg-surface-container-highest rounded-md transition-all duration-200">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body placeholder:text-outline/50" placeholder="e.g. Modernist Pavilion" type="text" value=""/>
</div>
</div>
<!-- Vercel App URL -->
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Vercel App URL</label>
<div class="focus-bar-input bg-surface-container-highest rounded-md transition-all duration-200">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body placeholder:text-outline/50" placeholder="https://project-name.vercel.app" type="url" value=""/>
</div>
</div>
<!-- GitHub URL -->
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">GitHub URL</label>
<div class="focus-bar-input bg-surface-container-highest rounded-md transition-all duration-200">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body placeholder:text-outline/50" placeholder="https://github.com/studio/repo" type="url" value=""/>
</div>
</div><!-- Local Address / Custom URL -->
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Local Address / Custom URL</label>
<div class="focus-bar-input bg-surface-container-highest rounded-md transition-all duration-200">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body placeholder:text-outline/50" placeholder="http://localhost:3000 or custom domain" type="text" value=""/>
</div>
</div>
<!-- Short Description -->
<div class="space-y-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Short Description</label>
<div class="focus-bar-input bg-surface-container-highest rounded-md transition-all duration-200">
<textarea class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body placeholder:text-outline/50 resize-none" placeholder="Brief technical summary of the project architecture and goals..." rows="4"></textarea>
</div>
</div>
<!-- Upload Screenshot -->
<div class="space-y-4">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant">Visual Asset</label>
<button class="group relative w-full aspect-video rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center gap-3 transition-all hover:bg-surface-container hover:border-outline-variant/60" type="button">
<div class="w-12 h-12 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="image">image</span>
</div>
<div class="text-center">
<p class="font-body text-sm font-semibold text-on-surface">Upload Screenshot</p>
<p class="font-body text-xs text-on-surface-variant mt-1">PNG, JPG up to 10MB</p>
</div>
</button>
</div>
<!-- Save Project Button -->
<div class="pt-6">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-bold py-4 rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-lg" data-icon="cloud_upload">cloud_upload</span>
                Save Project
            </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl border-t border-slate-200/15 dark:border-slate-800/15 shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
<!-- Projects Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 transition-all duration-300 ease-in-out hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-[0.05em] mt-1">Projects</span>
</a>
<!-- Add New Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-50 rounded-xl px-4 py-2 transition-all duration-300 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="add_box" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-[0.05em] mt-1">Add New</span>
</a>
<!-- Settings Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 transition-all duration-300 ease-in-out hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-[0.05em] mt-1">Settings</span>
</a>
</nav>
</body></html>
