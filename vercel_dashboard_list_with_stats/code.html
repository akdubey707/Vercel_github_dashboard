<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#565e74",
                        "secondary-fixed": "#d3e4fe",
                        "tertiary-fixed": "#89f5e7",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-fixed": "#131b2e",
                        "surface-dim": "#d8dadc",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed": "#0b1c30",
                        "outline-variant": "#c6c6cd",
                        "surface-variant": "#e0e3e5",
                        "outline": "#76777d",
                        "primary-fixed-dim": "#bec6e0",
                        "inverse-surface": "#2d3133",
                        "secondary": "#505f76",
                        "tertiary-container": "#00201d",
                        "on-tertiary-fixed-variant": "#005049",
                        "primary-fixed": "#dae2fd",
                        "surface-container-low": "#f2f4f6",
                        "primary": "#000000",
                        "on-secondary-container": "#54647a",
                        "on-secondary-fixed-variant": "#38485d",
                        "background": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "on-surface-variant": "#45464d",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1e",
                        "on-secondary": "#ffffff",
                        "tertiary": "#000000",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#00201d",
                        "error": "#ba1a1a",
                        "on-background": "#191c1e",
                        "on-primary-container": "#7c839b",
                        "primary-container": "#131b2e",
                        "surface": "#f7f9fb",
                        "on-primary-fixed-variant": "#3f465c",
                        "tertiary-fixed-dim": "#6bd8cb",
                        "on-tertiary-container": "#0c9488",
                        "inverse-primary": "#bec6e0",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-container": "#d0e1fb",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f9fb;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-slate-50 dark:bg-slate-950">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="architecture">architecture</span>
<h1 class="font-manrope font-extrabold text-xl tracking-tighter text-slate-900 dark:text-slate-50">Vercel Dashboard</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-slate-500 hover:bg-slate-200/50 p-2 rounded-full transition-colors" data-icon="search">search</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-6 min-h-screen max-w-xl mx-auto">
<!-- Section Header -->
<div class="mb-6">
<h2 class="font-headline font-extrabold text-2xl tracking-tight text-primary mb-2">My Projects</h2>
<div class="h-1 w-12 bg-on-tertiary-container rounded-full"></div>
</div><div class="grid grid-cols-3 gap-3 mb-8">
<!-- Total Deployed Tile -->
<div class="bg-white border border-slate-200 p-4 rounded flex flex-col gap-1 shadow-sm">
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-500 font-display">Total Deployed</span>
<div class="flex items-baseline gap-2"><span class="text-2xl font-extrabold text-[#0F172A] font-display">0</span></div>
</div>
<!-- Active Tile -->
<div class="bg-white border border-slate-200 p-4 rounded flex flex-col gap-1 shadow-sm">
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-500 font-display">Active</span>
<div class="flex items-baseline gap-2"><span class="text-2xl font-extrabold text-[#0F172A] font-display">0</span></div>
</div>
<!-- Archived Tile -->
<div class="bg-white border border-slate-200 p-4 rounded flex flex-col gap-1 shadow-sm">
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-500 font-display">Archived</span>
<div class="flex items-baseline gap-2"><span class="text-2xl font-extrabold text-[#0F172A] font-display">0</span></div>
</div>
</div>
<!-- Project Grid -->
<div class="grid grid-cols-1 gap-4"><div class="flex flex-col items-center justify-center py-20 px-6 text-center bg-white/50 border-2 border-dashed border-slate-200 rounded-xl"><span class="material-symbols-outlined text-4xl text-slate-300 mb-4" data-icon="folder_open">folder_open</span><h3 class="text-slate-900 font-bold mb-1">No projects yet</h3><p class="text-slate-500 text-sm max-w-[200px] mx-auto">Add your first project to get started with monitoring and deployments.</p></div></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0_-4px_24px_rgba(0,0,0,0.04)] border-t border-slate-200/15 dark:border-slate-800/15 rounded-t-xl px-4 pb-6 pt-3 flex justify-around items-center">
<!-- Projects (Active) -->
<a class="flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-50 rounded-xl px-5 py-2 transition-all duration-300 ease-in-out group" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-[0.05em]">Projects</span>
</a>
<!-- Add New (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 transition-all duration-300 ease-in-out hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_box">add_box</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-[0.05em]">Add New</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 transition-all duration-300 ease-in-out hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-[0.05em]">Settings</span>
</a>
</nav>
</body></html>
